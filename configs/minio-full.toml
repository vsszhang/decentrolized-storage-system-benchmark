[s3]
endpoint_url = "http://127.0.0.1:9000"
bucket = "benchmark"
region = "us-east-1"
use_ssl = false

[run]
name = "minio-full"
output_dir = "results"
seed = 42
cleanup = false

[[workloads]]
name = "small-random-write"
operation = "randomwrite"
object_size = "16KiB"
iterations = 1000
chunk_size = "16KiB"
key_prefix = "benchmark/full/small"

[[workloads]]
name = "small-random-read"
operation = "randomread"
object_size = "16KiB"
iterations = 1000
chunk_size = "16KiB"
key_prefix = "benchmark/full/small"
source_workload = "small-random-write"

[[workloads]]
name = "medium-seq-write"
operation = "seqwrite"
object_size = "10MiB"
iterations = 10
chunk_size = "1MiB"
key_prefix = "benchmark/full/medium"

[[workloads]]
name = "medium-seq-read"
operation = "seqread"
object_size = "10MiB"
iterations = 10
chunk_size = "1MiB"
key_prefix = "benchmark/full/medium"
source_workload = "medium-seq-write"

[[workloads]]
name = "large-seq-write-4gb"
operation = "seqwrite"
object_size = "4GiB"
iterations = 1
chunk_size = "8MiB"
key_prefix = "benchmark/full/large"

[[workloads]]
name = "large-seq-read-4gb"
operation = "seqread"
object_size = "4GiB"
iterations = 1
chunk_size = "8MiB"
key_prefix = "benchmark/full/large"
source_workload = "large-seq-write-4gb"

[[workloads]]
name = "large-seq-write-10gb"
operation = "seqwrite"
object_size = "10GiB"
iterations = 1
chunk_size = "8MiB"
key_prefix = "benchmark/full/large"

[[workloads]]
name = "large-seq-read-10gb"
operation = "seqread"
object_size = "10GiB"
iterations = 1
chunk_size = "8MiB"
key_prefix = "benchmark/full/large"
source_workload = "large-seq-write-10gb"
